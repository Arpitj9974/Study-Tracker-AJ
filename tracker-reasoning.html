<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reasoning Tracker — Arpit's Exam Hub</title>
  <link rel="stylesheet" href="assets/style.css"/>
  <script src="./assets/priority-data.js"></script>
</head>
<body style="--page-accent:#3B82F6">
<main>

  <div class="content-wrapper">
  <div class="tracker-shell page-content">
    <div class="tracker-header">
      <div class="th-top">
        <div class="th-title">🧠 Logical Reasoning</div>
        <div class="th-badges">
          <span class="badge badge--nqt">NQT · Phase 1 · 23 ch</span>
          <span class="badge badge--ssc">SSC · Phase 2 · 21 ch</span>
        </div>
      </div>
      <div class="th-mini-stats" id="reasoning-mini"></div>
    </div>
    <div class="tracker-iframe-wrap">
      <iframe id="tracker-frame" src="trackers/arpit_reasoning_tracker.html?v=2" title="Reasoning Tracker"
        scrolling="no" onload="syncIframeHeight(this)"></iframe>
    </div>
  </div>
  </div>
</main>
<script src="assets/nav.js?v=20"></script>
<script src="assets/dashboard.js?v=5"></script>
<script type="module" src="assets/auth-sync.js?v=20"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const exam = getCurrentExam();
    const frame = document.getElementById('tracker-frame');
    if (frame) frame.src = `trackers/arpit_reasoning_tracker.html?exam=${exam}&v=3`;
    
    const badgeContainer = document.querySelector('.th-badges');
    if (badgeContainer) {
      if (exam === 'nqt') {
        badgeContainer.innerHTML = `<span class="badge badge--nqt">TCS NQT · 23 Chapters</span>`;
      } else if (exam === 'ssc') {
        badgeContainer.innerHTML = `<span class="badge badge--ssc">SSC CGL · 44 Chapters</span>`;
      }
    }

    renderMiniStats('reasoning', 'reasoning-mini');
    setTimeout(() => injectPriorityData('reasoning'), 400);
  });
</script>
</body>
</html>
