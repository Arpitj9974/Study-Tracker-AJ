<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SSC Examination Dashboard — Arpit's Exam Hub</title>
  <meta name="description" content="Staff Selection Commission (SSC CGL, CHSL, MTS) preparation dashboard."/>
  <link rel="stylesheet" href="assets/style.css"/>
  <script src="assets/priority-data.js"></script>
  <script src="assets/ssc_chsl_exam_data.js"></script>
  <script src="assets/ssc_mts_exam_data.js"></script>
</head>
<body class="nav-loading">
<main>

  <div class="content-wrapper">
  <div class="page-content">
    
    <!-- Level Switcher Header -->
    <div style="margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:var(--bg-elevated);padding:16px 20px;border-radius:12px;border:1px solid var(--border-medium)">
      <div>
        <div style="font:700 20px/1.2 'DM Sans';color:var(--text-primary);display:flex;align-items:center;gap:10px">
          <span>📋</span> <span id="ssc-exam-title">SSC CGL</span>
        </div>
        <div style="font:400 13px/1.4 'DM Sans';color:var(--text-secondary);margin-top:4px" id="ssc-exam-sub">
          Combined Graduate Level Examination (Group B & C Posts)
        </div>
      </div>
      <!-- No Tabs - Standalone Exam -->
    </div>

    <!-- Exam Strategy Note Alert -->
    <div style="margin-bottom:20px;background:rgba(29,158,117,0.08);border:1px solid rgba(29,158,117,0.25);border-radius:10px;padding:14px 18px;font:400 13px/1.5 'DM Sans';color:var(--text-secondary)" id="ssc-strategy-note">
      <!-- Injected by JS -->
    </div>

    <!-- Master Donut & Pattern Table -->
    <div style="display:grid;grid-template-columns:300px 1fr;gap:20px;margin-bottom:32px">
      
      <!-- Left Donut Card -->
      <div style="background:var(--bg-elevated);border:1px solid var(--border-medium);border-radius:12px;padding:24px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="font:600 14px/1 'JetBrains Mono';color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px">Overall Completion</div>
        <div style="position:relative;width:140px;height:140px;margin-bottom:16px">
          <svg viewBox="0 0 36 36" style="width:100%;height:100%;transform:rotate(-90deg)">
            <path stroke="rgba(255,255,255,0.08)" stroke-width="3.8" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
            <path id="overall-donut-path" stroke="#1D9E75" stroke-width="3.8" stroke-dasharray="0, 100" stroke-linecap="round" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div style="font:700 26px/1 'JetBrains Mono';color:var(--text-primary)" id="overall-pct">0%</div>
            <div style="font:400 11px/1 'DM Sans';color:var(--text-tertiary);margin-top:4px" id="overall-count">0 / 162</div>
          </div>
        </div>
        <div style="font:500 12px/1.4 'DM Sans';color:var(--text-secondary)" id="ssc-days-left">
          Exam Countdown: Calculating...
        </div>
      </div>

      <!-- Right Pattern Breakdown Table -->
      <div style="background:var(--bg-elevated);border:1px solid var(--border-medium);border-radius:12px;padding:24px">
        <div style="font:700 16px/1 'DM Sans';color:var(--text-primary);margin-bottom:14px">Exam Pattern & Marks Split</div>
        <div id="ssc-pattern-details" style="font:400 13px/1.6 'DM Sans';color:var(--text-secondary)">
          <!-- Injected by JS -->
        </div>
      </div>
    </div>

    <!-- Subject Cards Grid -->
    <div style="font:700 18px/1 'DM Sans';color:var(--text-primary);margin-bottom:16px;display:flex;align-items:center;gap:10px">
      <span>📚</span> Subject Progress Breakdown
    </div>
    
    <div id="ssc-subject-cards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:32px">
      <!-- Injected by JS -->
    </div>

  </div>
  </div>

</main>

<script src="assets/nav.js?v=21"></script>
<script src="assets/dashboard-ssc.js?v=2"></script>
<script type="module" src="assets/auth-sync.js?v=21"></script>
</body>
</html>
