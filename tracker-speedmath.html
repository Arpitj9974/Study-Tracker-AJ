<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Speed Math Tracker — Arpit's Exam Hub</title>
  <link rel="stylesheet" href="assets/style.css"/>
  <script src="./assets/priority-data.js"></script>
</head>
<body style="--page-accent:#F97316">
<main>
  <div class="content-wrapper">
  <div class="tracker-shell page-content">
    <div class="tracker-header">
      <div class="th-top">
        <div class="th-title">⚡ Speed Math</div>
        <div class="th-badges">
          <span class="badge badge--nqt" style="background:rgba(249,115,22,0.15);color:#F97316;border-color:rgba(249,115,22,0.4)">Foundation · 28 Items</span>
        </div>
      </div>
      <div class="th-mini-stats" id="speedmath-mini"></div>
    </div>
    <div class="tracker-iframe-wrap">
      <iframe id="tracker-frame" src="trackers/speed_math_tracker.html?v=2" title="Speed Math Tracker"
        scrolling="no" onload="syncIframeHeight(this)"></iframe>
    </div>
  </div>
  </div>
</main>
<script src="assets/nav.js?v=6"></script>
<script src="assets/dashboard.js?v=5"></script>
<script type="module" src="assets/auth-sync.js?v=5"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const exam = getCurrentExam();
    const frame = document.getElementById('tracker-frame');
    if (frame) frame.src = `trackers/speed_math_tracker.html?exam=${exam}&v=3`;
    
    const badgeContainer = document.querySelector('.th-badges');
    if (badgeContainer) {
      if (exam === 'ssc') {
        badgeContainer.innerHTML = `<span class="badge badge--ssc">SSC CGL · Speed Math · 28 Items</span>`;
      } else {
        badgeContainer.innerHTML = `<span class="badge badge--nqt" style="background:rgba(249,115,22,0.15);color:#F97316;border-color:rgba(249,115,22,0.4)">TCS NQT · Speed Math · 28 Items</span>`;
      }
    }

    renderMiniStats('speedmath', 'speedmath-mini');
    setTimeout(() => injectPriorityData('speedmath'), 400);
  });
</script>
</body>
</html>
