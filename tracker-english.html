<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>

        <div class="th-title">📝 English Language</div>
        <div class="th-badges">

    <div class="tracker-iframe-wrap">
      <iframe id="tracker-frame" src="trackers/arpit_english_tracker.html?v=2" title="English Tracker"

  </div>
  </div>

<script src="assets/nav.js?v=4"></script>
<script type="module" src="assets/auth-sync.js?v=4"></script>

  document.addEventListener('DOMContentLoaded', () => {
    renderMiniStats('english', 'english-mini');
    setTimeout(() => injectPriorityData('english'), 400);
  });
</script>
