<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CFA Subject Tracker — Arpit's Exam Hub</title>
  <link rel="stylesheet" href="assets/style.css"/>
  <script src="./assets/cfa_l1_exam_data.js"></script>
  <script src="./assets/cfa_l2_exam_data.js"></script>
  <script src="./assets/cfa_l3_exam_data.js"></script>
  <style>
    .wrap { font-family: 'DM Sans', sans-serif; padding: 10px 0; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .sc { padding: 14px 16px; background: var(--bg-surface); border-radius: var(--radius-md); text-align: center; border: 1px solid var(--border-medium); }
    .sn { font-size: 24px; font-weight: 600; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }
    .sl { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

    .category-group { margin-bottom: 24px; }
    .cat-header { font: 600 12px/1 'JetBrains Mono'; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 0 6px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 12px; }

    .chapter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media(max-width: 768px) { .chapter-grid { grid-template-columns: 1fr; } }

    .ch-card {
      display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px;
      background: var(--bg-surface); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); cursor: pointer; transition: all 0.18s ease; user-select: none;
    }
    .ch-card:hover { background: var(--bg-hover); border-color: var(--border-medium); }
    .ch-card.done { opacity: 0.65; background: var(--bg-elevated); }
    .ch-card.done .ch-title { text-decoration: line-through; color: var(--text-tertiary); }
    .ch-card.done .ck-box { background: var(--page-accent, #1D4ED8); border-color: var(--page-accent, #1D4ED8); color: white; }

    .ck-box {
      width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--border-medium);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      font-size: 11px; color: transparent; transition: all 0.2s; background: var(--bg-elevated); margin-top: 2px;
    }
    .ch-num { font: 600 12px/1.4 'JetBrains Mono'; color: var(--text-tertiary); min-width: 22px; flex-shrink: 0; margin-top: 1px; }
    .ch-info { display: flex; flex-direction: column; flex: 1; min-width: 0; gap: 4px; }
    .ch-title { font: 500 13px/1.4 'DM Sans'; color: var(--text-primary); }
    .ch-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 2px; }

    .badge-pri { font: 700 8px/1 'JetBrains Mono'; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.04em; text-transform: uppercase; }
    .pri-VERY-HIGH { background: rgba(239,68,68,0.15); color: #F87171; border: 1px solid rgba(239,68,68,0.3); }
    .pri-HIGH      { background: rgba(251,146,60,0.15); color: #FB923C; border: 1px solid rgba(251,146,60,0.3); }
    .pri-MEDIUM    { background: rgba(250,204,21,0.12); color: #FCD34D; border: 1px solid rgba(250,204,21,0.25); }
    .pri-LOW       { background: rgba(148,163,184,0.1); color: #94A3B8; border: 1px solid rgba(148,163,184,0.2); }

    .meta-tag { font: 400 10px/1 'DM Sans'; color: var(--text-tertiary); background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle); padding: 2px 6px; border-radius: 4px; }
    .level-nav { display: flex; gap: 8px; margin-bottom: 16px; }
    .level-btn { font: 600 12px/1 'DM Sans'; padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border-medium); background: var(--bg-surface); color: var(--text-secondary); text-decoration: none; transition: all 0.2s; }
    .level-btn.active { background: #1D4ED8; color: white; border-color: #1D4ED8; }

    .ch-card.done.revised .ck-box { background:#F59E0B !important; border-color:#F59E0B !important; color:white !important; }
    .ch-card.done.mock .ck-box { background:#EC4899 !important; border-color:#EC4899 !important; color:white !important; }
  </style>
</head>
<body style="--page-accent:#1D4ED8">
<main>

  <div class="content-wrapper">
  <div class="tracker-shell page-content">

    <div class="level-nav">
      <a href="tracker-cfa.html?level=l1" class="level-btn" id="btn-l1">📊 Level 1</a>
      <a href="tracker-cfa.html?level=l2" class="level-btn" id="btn-l2">🏛️ Level 2</a>
      <a href="tracker-cfa.html?level=l3" class="level-btn" id="btn-l3">👑 Level 3</a>
    </div>

    <div class="tracker-header">
      <div class="th-top">
        <div class="th-title" id="subject-title">🎓 CFA Topic Tracker</div>
        <div class="th-badges" id="subject-badges">
          <span class="badge" style="background:rgba(29,78,216,0.15);color:#1D4ED8;border:1px solid rgba(29,78,216,0.3)" id="stage-badge">CFA</span>
        </div>
      </div>
      <div class="th-mini-stats" id="mini-stats"></div>
    </div>

    <div class="wrap">
      <div class="stats-row">
        <div class="sc"><div class="sn" id="stat-done">0</div><div class="sl">Completed</div></div>
        <div class="sc"><div class="sn" id="stat-rem">0</div><div class="sl">Remaining</div></div>
        <div class="sc"><div class="sn" id="stat-pct">0%</div><div class="sl">Progress</div></div>
      </div>

      <div id="categories-container"></div>
    </div>
  </div>
  </div>
</main>
<script src="assets/nav.js?v=21"></script>
<script type="module" src="assets/auth-sync.js?v=21"></script>
<script>
  // Dynamic CFA Subject Tracker Engine (Level 1 / 2 / 3)
  const params = new URLSearchParams(window.location.search);
  const level = params.get('level') || 'l1';
  const rawSubj = params.get('subj') || 'pm';

  let activeConfig = EXAM_CONFIG_CFA_L1;
  let activePriorityData = CFA_L1_PRIORITY_DATA;
  let examKeyStorage = 'cfa_l1';

  if (level === 'l2') {
    activeConfig = EXAM_CONFIG_CFA_L2;
    activePriorityData = CFA_L2_PRIORITY_DATA;
    examKeyStorage = 'cfa_l2';
    document.getElementById('btn-l2').classList.add('active');
  } else if (level === 'l3') {
    activeConfig = EXAM_CONFIG_CFA_L3;
    activePriorityData = CFA_L3_PRIORITY_DATA;
    examKeyStorage = 'cfa_l3';
    document.getElementById('btn-l3').classList.add('active');
  } else {
    document.getElementById('btn-l1').classList.add('active');
  }

  // Update tabs paths to keep current subject when switching levels
  document.getElementById('btn-l1').href = `tracker-cfa.html?level=l1&subj=${rawSubj}`;
  document.getElementById('btn-l2').href = `tracker-cfa.html?level=l2&subj=${rawSubj}`;
  document.getElementById('btn-l3').href = `tracker-cfa.html?level=l3&subj=${rawSubj}`;

  const subjConfig = activeConfig.subjects.find(s => s.key === rawSubj || s.prefix.includes(rawSubj || '')) || activeConfig.subjects[0];

  document.body.style.setProperty('--page-accent', subjConfig.color);
  document.getElementById('subject-title').innerHTML = `${subjConfig.icon} ${subjConfig.name}`;
  document.getElementById('stage-badge').textContent = subjConfig.examStage;
  document.title = `${subjConfig.name} — CFA Tracker`;

  // Update level selector styling
  const activeLevelBtn = document.querySelector('.level-btn.active');
  if (activeLevelBtn) {
    activeLevelBtn.style.background = subjConfig.color;
    activeLevelBtn.style.borderColor = subjConfig.color;
  }

  // Filter chapters for this subject
  const chapters = [];
  for (let i = 1; i <= subjConfig.totalChapters; i++) {
    const chKey = subjConfig.prefix + i;
    if (activePriorityData[chKey]) {
      chapters.push({ key: chKey, index: i, data: activePriorityData[chKey] });
    }
  }

  // Render chapters grouped by category
  function renderTracker() {
    let doneCount = 0;
    chapters.forEach(ch => {
      const val = localStorage.getItem(ch.key);
      if (val === '1' || val === '2' || val === '3') doneCount++;
    });

    const total = chapters.length;
    const remaining = total - doneCount;
    const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;

    document.getElementById('stat-done').textContent = doneCount;
    document.getElementById('stat-rem').textContent = remaining;
    document.getElementById('stat-pct').textContent = pct + '%';

    // Update mini-stats in top banner
    document.getElementById('mini-stats').innerHTML = `
      <div class="th-stat">
        <div class="th-stat-val" style="color:${subjConfig.color}">${doneCount}</div>
        <div class="th-stat-lbl">Done of ${total}</div>
      </div>
      <div class="th-stat">
        <div class="th-stat-val" style="color:${subjConfig.color}">${remaining}</div>
        <div class="th-stat-lbl">Remaining</div>
      </div>
      <div class="th-stat">
        <div class="th-stat-val" style="color:${subjConfig.color}">${pct}%</div>
        <div class="th-stat-lbl">Complete</div>
      </div>`;

    // Group by category
    const categories = {};
    chapters.forEach(ch => {
      const cat = ch.data.category || 'Core Units';
      if (!categories[cat]) categories[cat] = [];
      categories[cat].push(ch);
    });

    const container = document.getElementById('categories-container');
    container.innerHTML = Object.entries(categories).map(([catName, list]) => `
      <div class="category-group">
        <div class="cat-header">📂 ${catName}</div>
        <div class="chapter-grid">
          ${list.map(ch => {
            const val = localStorage.getItem(ch.key);
            const isDone = val === '1' || val === '2' || val === '3';
            let checkIcon = '✓';
            let extraClass = '';
            if (val === '2') { checkIcon = '⭐'; extraClass = ' revised'; }
            else if (val === '3') { checkIcon = '🏆'; extraClass = ' mock'; }
            
            const savedNote = localStorage.getItem('note_' + ch.key) || '';
            const hasNote = savedNote.trim() !== '';

            return `
              <div class="ch-card-container" style="display:flex; flex-direction:column; background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:var(--radius-md); padding:10px 12px; gap:8px;">
                <div class="ch-card ${isDone ? 'done' : ''}${extraClass}" onclick="toggleChapter('${ch.key}')" style="border:none; padding:0; background:transparent; display:flex; align-items:flex-start; gap:12px; width:100%; cursor:pointer;">
                  <div class="ck-box">${checkIcon}</div>
                  <span class="ch-num">${ch.index}</span>
                  <div class="ch-info">
                    <span class="ch-title">${ch.data.name}</span>
                    <div class="ch-meta">
                      <span class="badge-pri pri-${ch.data.priority}">${ch.data.priority}</span>
                      <span class="meta-tag">📊 ${ch.data.prelimsWeight}</span>
                      <span class="meta-tag">⏱ ${ch.data.days}</span>
                      <span class="meta-tag" style="color:var(--text-secondary)">${ch.data.stage}</span>
                      <button class="ch-note-btn${hasNote ? ' active' : ''}" onclick="event.stopPropagation(); toggleNotesDrawer('${ch.key}')" title="Add Study Notes">📝</button>
                    </div>
                  </div>
                </div>
                <div id="drawer-${ch.key}" class="note-drawer" style="display:none;" onclick="event.stopPropagation();">
                  <textarea id="note-txt-${ch.key}" class="note-textarea" placeholder="Add study notes or key formulae...">${savedNote}</textarea>
                  <button onclick="saveNote('${ch.key}')" class="note-save-btn">Save Note</button>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `).join('');
  }

  window.toggleNotesDrawer = function(key) {
    const drawer = document.getElementById('drawer-' + key);
    if (drawer) {
      drawer.style.display = drawer.style.display === 'none' ? 'flex' : 'none';
    }
  };

  window.saveNote = function(key) {
    const txt = document.getElementById('note-txt-' + key).value;
    if (txt.trim()) {
      localStorage.setItem('note_' + key, txt);
    } else {
      localStorage.removeItem('note_' + key);
    }
    // Bump streak for writing notes too!
    if (window.bumpStreak) window.bumpStreak();
    renderTracker();
  };

  window.toggleChapter = function(key) {
    const current = localStorage.getItem(key);
    if (current === '1') {
      localStorage.setItem(key, '2');
    } else if (current === '2') {
      localStorage.setItem(key, '3');
    } else if (current === '3') {
      localStorage.removeItem(key);
    } else {
      localStorage.setItem(key, '1');
    }
    if (window.bumpStreak) window.bumpStreak();
    window.dispatchEvent(new Event('storage'));
    renderTracker();
  };

  document.addEventListener('DOMContentLoaded', () => {
    localStorage.setItem('selectedExam', examKeyStorage);
    renderTracker();
  });

  window.addEventListener('cloudDataSynced', renderTracker);
  window.addEventListener('storage', renderTracker);
</script>
</body>
</html>
