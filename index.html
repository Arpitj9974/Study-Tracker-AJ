<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Arpit's Exam Hub — Choose Your Exam</title>
  <meta name="description" content="Select your exam to start tracking: TCS NQT, SSC CGL, or UPSC."/>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; flex-direction:column; overflow:auto; }
    .selector-page { width:100%; max-width:900px; text-align:center; animation:fadeUp .4s ease; }
    .sel-brand { margin-bottom:48px; }
    .sel-icon { font-size:56px; margin-bottom:14px; display:block; }
    .sel-title { font:700 32px/1.2 'DM Sans'; color:var(--text-primary); margin-bottom:8px; }
    .sel-sub { font:500 13px/1.5 'JetBrains Mono'; color:var(--accent-purple); text-transform:uppercase; letter-spacing:.08em; }
    .sel-desc { font:400 14px/1.6 'DM Sans'; color:var(--text-secondary); margin-top:12px; max-width:500px; margin-left:auto; margin-right:auto; }

    .exam-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:48px; }
    @media(max-width:700px){ .exam-grid{ grid-template-columns:1fr; max-width:360px; margin-left:auto; margin-right:auto; } }

    .exam-card {
      position:relative; background:var(--bg-elevated); border:1px solid var(--border-medium);
      border-radius:var(--radius-lg); padding:32px 24px 28px; text-align:center;
      text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:14px;
      transition:all .25s ease; cursor:pointer; overflow:hidden;
      border-top:3px solid transparent;
    }
    .exam-card::before {
      content:''; position:absolute; inset:0; border-radius:inherit;
      background:radial-gradient(ellipse at 50% 0%, var(--card-glow, rgba(127,119,221,0.08)) 0%, transparent 70%);
      opacity:0; transition:opacity .3s;
    }
    .exam-card:hover { transform:translateY(-6px); border-color:var(--card-border, var(--border-medium));
      box-shadow:0 12px 40px rgba(0,0,0,.4), 0 0 0 1px var(--card-border, var(--border-medium)); }
    .exam-card:hover::before { opacity:1; }
    .exam-card.disabled { opacity:.5; cursor:not-allowed; pointer-events:none; }

    .ec-icon { font-size:48px; position:relative; z-index:1; }
    .ec-name { font:700 20px/1.2 'DM Sans'; color:var(--text-primary); position:relative; z-index:1; }
    .ec-desc { font:400 12px/1.5 'DM Sans'; color:var(--text-secondary); position:relative; z-index:1; }
    .ec-stats { display:flex; gap:14px; justify-content:center; position:relative; z-index:1; margin-top:4px; }
    .ec-stat { text-align:center; }
    .ec-stat-val { font:600 18px/1 'JetBrains Mono'; }
    .ec-stat-lbl { font:400 10px/1 'DM Sans'; color:var(--text-tertiary); margin-top:3px; }
    .ec-badge {
      font:600 10px/1 'JetBrains Mono'; text-transform:uppercase; letter-spacing:.06em;
      padding:4px 10px; border-radius:20px; position:relative; z-index:1;
    }
    .ec-enter {
      font:600 13px/1 'DM Sans'; color:white; padding:10px 24px; border-radius:8px;
      border:none; cursor:pointer; position:relative; z-index:1; transition:all .2s;
      margin-top:4px;
    }
    .ec-enter:hover { filter:brightness(1.15); transform:scale(1.02); }

    .ec-coming {
      font:600 11px/1 'DM Sans'; color:var(--text-tertiary); padding:8px 16px;
      border:1px dashed var(--border-medium); border-radius:8px; position:relative; z-index:1;
    }

    /* Footer */
    .sel-footer { font:400 12px/1.5 'DM Sans'; color:var(--text-tertiary); }
    .sel-footer a { color:var(--accent-purple); text-decoration:none; }
  </style>
</head>
<body>

  <div class="selector-page">
    <div class="sel-brand">
      <span class="sel-icon">🎯</span>
      <div class="sel-title">Arpit's Exam Hub</div>
      <div class="sel-sub">Choose Your Exam</div>
      <div class="sel-desc">Select the exam you want to prepare for. Each exam has its own dashboard, subjects, and progress tracker.</div>
    </div>

    <div class="exam-grid" id="exam-grid">
      <!-- Cards injected by JS -->
    </div>

    <div class="sel-footer">
      Progress is shared across exams — study once, benefit everywhere.
    </div>
  </div>

  <script src="assets/nav.js?v=5"></script>
  <script>
    // Render exam cards
    const grid = document.getElementById('exam-grid');

    // NQT stats
    const nqtStats = readExamStats('nqt');
    const nqtDone = Object.values(nqtStats).reduce((s, v) => s + v.done, 0);
    const nqtPct = Math.round((nqtDone / EXAM_CONFIG.nqt.totalChapters) * 100);
    const nqtDays = Math.ceil((new Date(EXAM_CONFIG.nqt.examDate + 'T00:00:00') - new Date()) / 86400000);

    // SSC stats
    const sscStats = readExamStats('ssc');
    const sscDone = Object.values(sscStats).reduce((s, v) => s + v.done, 0);
    const sscPct = Math.round((sscDone / EXAM_CONFIG.ssc.totalChapters) * 100);
    const sscDays = Math.ceil((new Date(EXAM_CONFIG.ssc.examDate + 'T00:00:00') - new Date()) / 86400000);

    // UPSC stats
    const upscStats = readExamStats('upsc');
    const upscDone = Object.values(upscStats).reduce((s, v) => s + v.done, 0);
    const upscPct = Math.round((upscDone / EXAM_CONFIG.upsc.totalChapters) * 100);
    const upscDays = Math.ceil((new Date(EXAM_CONFIG.upsc.examDate + 'T00:00:00') - new Date()) / 86400000);

    // IBPS PO stats
    const ibpsStats = readExamStats('ibps_po');
    const ibpsDone = Object.values(ibpsStats).reduce((s, v) => s + v.done, 0);
    const ibpsPct = Math.round((ibpsDone / EXAM_CONFIG.ibps_po.totalChapters) * 100);
    const ibpsDays = Math.ceil((new Date(EXAM_CONFIG.ibps_po.examDate + 'T00:00:00') - new Date()) / 86400000);

    // JEE stats
    const jeeStats = readExamStats('jee');
    const jeeDone = Object.values(jeeStats).reduce((s, v) => s + v.done, 0);
    const jeePct = Math.round((jeeDone / EXAM_CONFIG.jee.totalChapters) * 100);
    const jeeDays = Math.ceil((new Date(EXAM_CONFIG.jee.examDate + 'T00:00:00') - new Date()) / 86400000);

    // NEET UG stats
    const neetStats = readExamStats('neet_ug');
    const neetDone = Object.values(neetStats).reduce((s, v) => s + v.done, 0);
    const neetPct = Math.round((neetDone / EXAM_CONFIG.neet_ug.totalChapters) * 100);
    const neetDays = Math.ceil((new Date(EXAM_CONFIG.neet_ug.examDate + 'T00:00:00') - new Date()) / 86400000);

    // CAT stats
    const catStats = readExamStats('cat');
    const catDone = Object.values(catStats).reduce((s, v) => s + v.done, 0);
    const catPct = Math.round((catDone / EXAM_CONFIG.cat.totalChapters) * 100);
    const catDays = Math.ceil((new Date(EXAM_CONFIG.cat.examDate + 'T00:00:00') - new Date()) / 86400000);

    grid.innerHTML = `
      <a href="dashboard-nqt.html" class="exam-card" style="--card-glow:rgba(127,119,221,0.12);--card-border:rgba(127,119,221,0.4);border-top-color:#7F77DD" onclick="localStorage.setItem('selectedExam','nqt')">
        <span class="ec-icon">🎯</span>
        <div class="ec-name">TCS NQT</div>
        <div class="ec-desc">Speed Math, Quant, Reasoning, English & Coding</div>
        <div class="ec-stats">
          <div class="ec-stat"><div class="ec-stat-val" style="color:#7F77DD">${nqtPct}%</div><div class="ec-stat-lbl">complete</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:#7F77DD">${nqtDone}</div><div class="ec-stat-lbl">of ${EXAM_CONFIG.nqt.totalChapters}</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:${nqtDays < 30 ? '#EF4444' : '#1D9E75'}">${nqtDays > 0 ? nqtDays : '🎯'}</div><div class="ec-stat-lbl">${nqtDays > 0 ? 'days left' : 'exam day!'}</div></div>
        </div>
        <span class="ec-badge" style="background:rgba(127,119,221,0.15);color:#7F77DD;border:1px solid rgba(127,119,221,0.3)">${EXAM_CONFIG.nqt.subjects.length} Subjects · ${EXAM_CONFIG.nqt.totalChapters} Chapters</span>
        <button class="ec-enter" style="background:#7F77DD">Start NQT Prep →</button>
      </a>

      <a href="dashboard-ssc.html" class="exam-card" style="--card-glow:rgba(29,158,117,0.12);--card-border:rgba(29,158,117,0.4);border-top-color:#1D9E75" onclick="localStorage.setItem('selectedExam','ssc')">
        <span class="ec-icon">📋</span>
        <div class="ec-name">SSC CGL</div>
        <div class="ec-desc">Quant, Reasoning, English & General Knowledge</div>
        <div class="ec-stats">
          <div class="ec-stat"><div class="ec-stat-val" style="color:#1D9E75">${sscPct}%</div><div class="ec-stat-lbl">complete</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:#1D9E75">${sscDone}</div><div class="ec-stat-lbl">of ${EXAM_CONFIG.ssc.totalChapters}</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:${sscDays < 30 ? '#EF4444' : '#1D9E75'}">${sscDays > 0 ? sscDays : '🎯'}</div><div class="ec-stat-lbl">${sscDays > 0 ? 'days left' : 'exam day!'}</div></div>
        </div>
        <span class="ec-badge" style="background:rgba(29,158,117,0.15);color:#1D9E75;border:1px solid rgba(29,158,117,0.3)">${EXAM_CONFIG.ssc.subjects.length} Subjects · ${EXAM_CONFIG.ssc.totalChapters} Chapters</span>
        <button class="ec-enter" style="background:#1D9E75">Start SSC Prep →</button>
      </a>

      <a href="dashboard-upsc.html" class="exam-card" style="--card-glow:rgba(59,91,219,0.12);--card-border:rgba(59,91,219,0.4);border-top-color:#3B5BDB" onclick="localStorage.setItem('selectedExam','upsc')">
        <span class="ec-icon">🏛️</span>
        <div class="ec-name">UPSC CSE</div>
        <div class="ec-desc">Polity, History, Geography, Economy, Ethics & CSAT</div>
        <div class="ec-stats">
          <div class="ec-stat"><div class="ec-stat-val" style="color:#3B5BDB">${upscPct}%</div><div class="ec-stat-lbl">complete</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:#3B5BDB">${upscDone}</div><div class="ec-stat-lbl">of ${EXAM_CONFIG.upsc.totalChapters}</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:${upscDays < 30 ? '#EF4444' : '#3B5BDB'}">${upscDays > 0 ? upscDays : '🎯'}</div><div class="ec-stat-lbl">${upscDays > 0 ? 'days left' : 'exam day!'}</div></div>
        </div>
        <span class="ec-badge" style="background:rgba(59,91,219,0.15);color:#3B5BDB;border:1px solid rgba(59,91,219,0.3)">${EXAM_CONFIG.upsc.subjects.length} Subjects · ${EXAM_CONFIG.upsc.totalChapters} Chapters</span>
        <button class="ec-enter" style="background:#3B5BDB">Start UPSC Prep →</button>
      </a>

      <a href="dashboard-ibps.html" class="exam-card" style="--card-glow:rgba(183,121,31,0.12);--card-border:rgba(183,121,31,0.4);border-top-color:#B7791F" onclick="localStorage.setItem('selectedExam','ibps_po')">
        <span class="ec-icon">🏦</span>
        <div class="ec-name">IBPS PO</div>
        <div class="ec-desc">Quant, Reasoning, English, DI, Banking & Descriptive</div>
        <div class="ec-stats">
          <div class="ec-stat"><div class="ec-stat-val" style="color:#B7791F">${ibpsPct}%</div><div class="ec-stat-lbl">complete</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:#B7791F">${ibpsDone}</div><div class="ec-stat-lbl">of ${EXAM_CONFIG.ibps_po.totalChapters}</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:${ibpsDays < 30 ? '#EF4444' : '#B7791F'}">${ibpsDays > 0 ? ibpsDays : '🎯'}</div><div class="ec-stat-lbl">${ibpsDays > 0 ? 'days left' : 'exam day!'}</div></div>
        </div>
        <span class="ec-badge" style="background:rgba(183,121,31,0.15);color:#B7791F;border:1px solid rgba(183,121,31,0.3)">${EXAM_CONFIG.ibps_po.subjects.length} Subjects · ${EXAM_CONFIG.ibps_po.totalChapters} Chapters</span>
        <button class="ec-enter" style="background:#B7791F">Start IBPS Prep →</button>
      </a>

      <a href="dashboard-jee.html" class="exam-card" style="--card-glow:rgba(59,91,219,0.12);--card-border:rgba(59,91,219,0.4);border-top-color:#3B5BDB" onclick="localStorage.setItem('selectedExam','jee')">
        <span class="ec-icon">⚛️</span>
        <div class="ec-name">JEE Main & Adv</div>
        <div class="ec-desc">Physics, Chemistry & Mathematics (PCM)</div>
        <div class="ec-stats">
          <div class="ec-stat"><div class="ec-stat-val" style="color:#3B5BDB">${jeePct}%</div><div class="ec-stat-lbl">complete</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:#3B5BDB">${jeeDone}</div><div class="ec-stat-lbl">of ${EXAM_CONFIG.jee.totalChapters}</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:${jeeDays < 30 ? '#EF4444' : '#3B5BDB'}">${jeeDays > 0 ? jeeDays : '🎯'}</div><div class="ec-stat-lbl">${jeeDays > 0 ? 'days left' : 'exam day!'}</div></div>
        </div>
        <span class="ec-badge" style="background:rgba(59,91,219,0.15);color:#3B5BDB;border:1px solid rgba(59,91,219,0.3)">${EXAM_CONFIG.jee.subjects.length} Subjects · ${EXAM_CONFIG.jee.totalChapters} Chapters</span>
        <button class="ec-enter" style="background:#3B5BDB">Start JEE Prep →</button>
      </a>

      <a href="dashboard-neet.html" class="exam-card" style="--card-glow:rgba(76,154,63,0.12);--card-border:rgba(76,154,63,0.4);border-top-color:#4C9A3F" onclick="localStorage.setItem('selectedExam','neet_ug')">
        <span class="ec-icon">🩺</span>
        <div class="ec-name">NEET UG</div>
        <div class="ec-desc">Botany, Zoology, Chemistry & Physics (PCB)</div>
        <div class="ec-stats">
          <div class="ec-stat"><div class="ec-stat-val" style="color:#4C9A3F">${neetPct}%</div><div class="ec-stat-lbl">complete</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:#4C9A3F">${neetDone}</div><div class="ec-stat-lbl">of ${EXAM_CONFIG.neet_ug.totalChapters}</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:${neetDays < 30 ? '#EF4444' : '#4C9A3F'}">${neetDays > 0 ? neetDays : '🎯'}</div><div class="ec-stat-lbl">${neetDays > 0 ? 'days left' : 'exam day!'}</div></div>
        </div>
        <span class="ec-badge" style="background:rgba(76,154,63,0.15);color:#4C9A3F;border:1px solid rgba(76,154,63,0.3)">${EXAM_CONFIG.neet_ug.subjects.length} Subjects · ${EXAM_CONFIG.neet_ug.totalChapters} Chapters</span>
        <button class="ec-enter" style="background:#4C9A3F">Start NEET Prep →</button>
      </a>

      <a href="dashboard-cat.html" class="exam-card" style="--card-glow:rgba(230,126,34,0.12);--card-border:rgba(230,126,34,0.4);border-top-color:#E67E22" onclick="localStorage.setItem('selectedExam','cat')">
        <span class="ec-icon">📈</span>
        <div class="ec-name">CAT (MBA)</div>
        <div class="ec-desc">Quantitative Ability, DILR & VARC</div>
        <div class="ec-stats">
          <div class="ec-stat"><div class="ec-stat-val" style="color:#E67E22">${catPct}%</div><div class="ec-stat-lbl">complete</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:#E67E22">${catDone}</div><div class="ec-stat-lbl">of ${EXAM_CONFIG.cat.totalChapters}</div></div>
          <div class="ec-stat"><div class="ec-stat-val" style="color:${catDays < 30 ? '#EF4444' : '#E67E22'}">${catDays > 0 ? catDays : '🎯'}</div><div class="ec-stat-lbl">${catDays > 0 ? 'days left' : 'exam day!'}</div></div>
        </div>
        <span class="ec-badge" style="background:rgba(230,126,34,0.15);color:#E67E22;border:1px solid rgba(230,126,34,0.3)">${EXAM_CONFIG.cat.subjects.length} Subjects · ${EXAM_CONFIG.cat.totalChapters} Chapters</span>
        <button class="ec-enter" style="background:#E67E22">Start CAT Prep →</button>
      </a>
    `;
  </script>
  <script type="module" src="assets/auth-sync.js?v=5"></script>
</body>
</html>
