<!DOCTYPE html>

<head>

  <style>
    body { display:flex; align-items:center; justify-content:flex-start; min-height:100vh; padding:32px 24px 48px; flex-direction:column; overflow-y:auto; }
    .selector-page { width:100%; max-width:960px; text-align:center; animation:fadeUp .4s ease; margin:auto; }
    .sel-brand { margin-bottom:48px; }
    .sel-icon { font-size:56px; margin-bottom:14px; display:block; }
    .sel-title { font:700 32px/1.2 'DM Sans'; color:var(--text-primary); margin-bottom:8px; }
    .sel-sub { font:500 13px/1.5 'JetBrains Mono'; color:var(--accent-purple); text-transform:uppercase; letter-spacing:.08em; }
    .sel-desc { font:400 14px/1.6 'DM Sans'; color:var(--text-secondary); margin-top:12px; max-width:500px; margin-left:auto; margin-right:auto; }

    .exam-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:48px; }
    @media(max-width:700px){ .exam-grid{ grid-template-columns:1fr; max-width:360px; margin-left:auto; margin-right:auto; } }

    .exam-card {
      position:relative; background:var(--bg-elevated); border:1px solid var(--border-medium);
      border-radius:var(--radius-lg); padding:32px 24px 28px; text-align:center;
      text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:14px;
      transition:all .25s ease; cursor:pointer; overflow:hidden;
      border-top:3px solid transparent;
    }
    .exam-card::before {
      content:''; position:absolute; inset:0; border-radius:inherit;
      background:radial-gradient(ellipse at 50% 0%, var(--card-glow, rgba(127,119,221,0.08)) 0%, transparent 70%);
      opacity:0; transition:opacity .3s;
    }
    .exam-card:hover { transform:translateY(-6px); border-color:var(--card-border, var(--border-medium));
      box-shadow:0 12px 40px rgba(0,0,0,.4), 0 0 0 1px var(--card-border, var(--border-medium)); }
    .exam-card:hover::before { opacity:1; }
    .exam-card.disabled { opacity:.5; cursor:not-allowed; pointer-events:none; }

    .ec-icon { font-size:48px; position:relative; z-index:1; }
    .ec-name { font:700 20px/1.2 'DM Sans'; color:var(--text-primary); position:relative; z-index:1; }
    .ec-desc { font:400 12px/1.5 'DM Sans'; color:var(--text-secondary); position:relative; z-index:1; }
    .ec-stats { display:flex; gap:14px; justify-content:center; position:relative; z-index:1; margin-top:4px; }
    .ec-stat { text-align:center; }
    .ec-stat-val { font:600 18px/1 'JetBrains Mono'; }
    .ec-stat-lbl { font:400 10px/1 'DM Sans'; color:var(--text-tertiary); margin-top:3px; }
    .ec-badge {
      font:600 10px/1 'JetBrains Mono'; text-transform:uppercase; letter-spacing:.06em;
      padding:4px 10px; border-radius:20px; position:relative; z-index:1;
    }
    .ec-enter {
      font:600 13px/1 'DM Sans'; color:white; padding:10px 24px; border-radius:8px;
      border:none; cursor:pointer; position:relative; z-index:1; transition:all .2s;
      margin-top:4px;
    }
    .ec-enter:hover { filter:brightness(1.15); transform:scale(1.02); }

    .ec-coming {
      font:600 11px/1 'DM Sans'; color:var(--text-tertiary); padding:8px 16px;
      border:1px dashed var(--border-medium); border-radius:8px; position:relative; z-index:1;
    }

    /* Footer */
    .sel-footer { font:400 12px/1.5 'DM Sans'; color:var(--text-tertiary); }
    .sel-footer a { color:var(--accent-purple); text-decoration:none; }
  </style>
</head>
