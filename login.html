<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Arpit's Exam Hub</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .auth-card { background:var(--bg-elevated); border:1px solid var(--border-medium); border-radius:var(--radius-lg); padding:40px 32px; width:100%; max-width:400px; box-shadow:0 12px 40px rgba(0,0,0,0.5); text-align:center; }
    .brand-icon { font-size:40px; margin-bottom:12px; }
    .brand-title { font:700 24px/1.2 'DM Sans'; color:var(--text-primary); margin-bottom:6px; }
    .brand-sub { font:500 12px/1.5 'JetBrains Mono'; color:var(--accent-purple); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:32px; }
    
    .auth-form { display:flex; flex-direction:column; gap:16px; text-align:left; }
    .input-group { display:flex; flex-direction:column; gap:6px; }
    .input-group label { font:500 12px/1 'DM Sans'; color:var(--text-secondary); }
    .input-group input { background:var(--bg-surface); border:1px solid var(--border-medium); border-radius:8px; padding:12px 16px; font:400 14px/1 'DM Sans'; color:var(--text-primary); outline:none; transition:border-color 0.2s; }
    .input-group input:focus { border-color:var(--accent-purple); }
    
    .btn { background:var(--accent-purple); color:white; border:none; border-radius:8px; padding:14px; font:600 14px/1 'DM Sans'; cursor:pointer; transition:background 0.2s; margin-top:8px; }
    .btn:hover { background:#6A62C5; }
    .btn:disabled { opacity:0.6; cursor:not-allowed; }
    
    .auth-switch { font:400 13px/1.5 'DM Sans'; color:var(--text-secondary); margin-top:24px; }
    .auth-switch a { color:var(--accent-purple); text-decoration:none; font-weight:600; cursor:pointer; }
    .auth-switch a:hover { text-decoration:underline; }
    
    .error-msg { color:var(--accent-red,#EF4444); font:500 12px/1.4 'DM Sans'; text-align:center; min-height:16px; margin-top:10px; }
    
    .hidden { display:none; }
  </style>
</head>
<body>

  <div class="auth-card" id="login-view">
    <div class="brand-icon">🎯</div>
    <div class="brand-title">Welcome Back</div>
    <div class="brand-sub">Arpit's Exam Hub</div>
    
    <form class="auth-form" id="login-form">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="login-email" required placeholder="you@example.com">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="login-pass" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn" id="login-btn">Log In</button>
      <div class="error-msg" id="login-error"></div>
    </form>
    
    <div class="auth-switch">
      Don't have an account? <a onclick="toggleView('signup')">Sign up</a>
    </div>
  </div>

  <div class="auth-card hidden" id="signup-view">
    <div class="brand-icon">✨</div>
    <div class="brand-title">Create Account</div>
    <div class="brand-sub">Start Tracking Progress</div>
    
    <form class="auth-form" id="signup-form">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="signup-email" required placeholder="you@example.com">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signup-pass" required placeholder="Min 6 characters">
      </div>
      <button type="submit" class="btn" id="signup-btn">Sign Up</button>
      <div class="error-msg" id="signup-error"></div>
    </form>
    
    <div class="auth-switch">
      Already have an account? <a onclick="toggleView('login')">Log in</a>
    </div>
  </div>

  <script>
    function toggleView(view) {
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('signup-view').classList.add('hidden');
      document.getElementById(view + '-view').classList.remove('hidden');
    }
  </script>
  <!-- Load the main auth logic -->
  <script type="module" src="assets/login.js"></script>
</body>
</html>
