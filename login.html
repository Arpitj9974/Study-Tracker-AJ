<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AspirantFlow — Verification Gate</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css?v=2">
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background-color: #0D0F14;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Glow Orbs */
    .ambient-orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(120px);
    }
    .orb-purple {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(127, 119, 221, 0.15) 0%, rgba(13, 15, 20, 0) 70%);
      top: -100px;
      right: -100px;
    }
    .orb-blue {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, rgba(13, 15, 20, 0) 70%);
      bottom: -80px;
      left: -80px;
    }

    .auth-card {
      position: relative;
      z-index: 10;
      background: rgba(20, 23, 32, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 48px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
      text-align: center;
      transition: all 0.3s ease;
    }

    .brand-icon {
      font-size: 44px;
      margin-bottom: 16px;
      display: inline-block;
      filter: drop-shadow(0 0 12px rgba(127, 119, 221, 0.5));
      animation: pulseGlow 3s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(127, 119, 221, 0.4)); }
      50% { transform: scale(1.08); filter: drop-shadow(0 0 24px rgba(127, 119, 221, 0.8)); }
    }

    .brand-title {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
      color: #F0F2FF;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .brand-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #7F77DD;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 36px;
    }
    
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: left;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-size: 11px;
      font-weight: 600;
      color: #9BA3C4;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .input-group input {
      background: rgba(13, 15, 20, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      color: #F0F2FF;
      outline: none;
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      border-color: #7F77DD;
      background: rgba(13, 15, 20, 0.8);
      box-shadow: 0 0 0 4px rgba(127, 119, 221, 0.15);
    }
    
    .btn {
      background: linear-gradient(135deg, #7F77DD 0%, #534AB7 100%);
      color: #FFFFFF;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
      box-shadow: 0 4px 16px rgba(127, 119, 221, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(127, 119, 221, 0.5);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .google-login-btn {
      background: rgba(255, 255, 255, 0.03);
      color: #F0F2FF;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
    }

    .google-login-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }
    
    .auth-switch {
      font-size: 13px;
      color: #9BA3C4;
      margin-top: 28px;
    }

    .auth-switch a {
      color: #7F77DD;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
      transition: color 0.2s;
    }

    .auth-switch a:hover {
      color: #A39DFF;
      text-decoration: underline;
    }
    
    .error-msg {
      color: #EF4444;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      min-height: 18px;
      margin-top: 10px;
    }
    
    .divider-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .divider-text {
      font-size: 11px;
      font-weight: 700;
      color: #5A6080;
      letter-spacing: 0.05em;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- Ambient background visuals -->
  <div class="ambient-orb orb-purple"></div>
  <div class="ambient-orb orb-blue"></div>

  <!-- Sign In Form View -->
  <div class="auth-card" id="login-view">
    <div class="brand-icon">⚡</div>
    <h2 class="brand-title">Welcome to AspirantFlow</h2>
    <div class="brand-sub">ArpitPrep Hub</div>
    
    <form class="auth-form" id="login-form">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="login-email" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="login-pass" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="login-btn">Log In</button>
      <div class="error-msg" id="login-error"></div>
    </form>
    
    <div class="divider-container">
      <div class="divider-line"></div>
      <span class="divider-text">OR</span>
      <div class="divider-line"></div>
    </div>
    
    <button type="button" class="google-login-btn">
      <svg style="width:18px; height:18px;" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
    
    <div class="auth-switch">
      Don't have an account? <a onclick="toggleView('signup')">Sign up</a>
    </div>
  </div>

  <!-- Sign Up Form View -->
  <div class="auth-card hidden" id="signup-view">
    <div class="brand-icon">✨</div>
    <h2 class="brand-title">Create Account</h2>
    <div class="brand-sub">Start Tracking Progress</div>
    
    <form class="auth-form" id="signup-form">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="signup-email" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signup-pass" required placeholder="Min 6 characters" autocomplete="new-password">
      </div>
      <button type="submit" class="btn" id="signup-btn">Sign Up</button>
      <div class="error-msg" id="signup-error"></div>
    </form>
    
    <div class="divider-container">
      <div class="divider-line"></div>
      <span class="divider-text">OR</span>
      <div class="divider-line"></div>
    </div>
    
    <button type="button" class="google-login-btn">
      <svg style="width:18px; height:18px;" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
    
    <div class="auth-switch">
      Already have an account? <a onclick="toggleView('login')">Log in</a>
    </div>
  </div>

  <script>
    function toggleView(view) {
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('signup-view').classList.add('hidden');
      document.getElementById(view + '-view').classList.remove('hidden');
    }
  </script>
  <!-- Load the main auth logic -->
  <script type="module" src="assets/auth-sync.js?v=25"></script>
  <script type="module" src="assets/login.js"></script>
</body>
</html>
